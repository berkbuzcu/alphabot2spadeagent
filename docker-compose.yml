version: '3.8'

services:
  prosody:
    image: tobi312/prosody:latest
    container_name: prosody
    networks:
      - xmpp_network
    ports:
      - 5000:5000
      - 5222:5222
      - 5269:5269
      - 5280:5280
      - 5281:5281
      - 5347:5347
    volumes:
      - ./prosody/entrypoint.d:/entrypoint.d:ro
    environment:
      TZ: "Europe/Berlin"
      SELECT_COMMUNITY_MODULES: "mod_cloud_notify mod_csi mod_http_upload mod_lastlog mod_mam_muc mod_smacks"

  agent:
    build: .
    container_name: agent
    devices:
      - /dev/gpiomem:/dev/gpiomem
    networks:
      - xmpp_network
    privileged: true
    cap_add:
      - SYS_RAWIO
    depends_on:
      - prosody
    environment:
      XMPP_SERVER: prosody
      XMPP_PORT: 5222
      XMPP_JID: "agent@localhost"
      XMPP_PASSWORD: "top_secret"

networks:
  xmpp_network:

volumes:
  prosody_data:
  prosody_config:
  prosody_logs:
